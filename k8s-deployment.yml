apiVersion: v1
kind: Namespace
metadata:
  name: active-learning

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: al-system
  namespace: active-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: al-system
  template:
    metadata:
      labels:
        app: al-system
    spec:
      containers:
      - name: al-system
        image: saitejasrivilli/active-learning:latest
        ports:
        - containerPort: 8000
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: DEVICE
          value: "cpu"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: results
          mountPath: /app/results
      volumes:
      - name: data
        emptyDir: {}
      - name: results
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: al-system-service
  namespace: active-learning
spec:
  selector:
    app: al-system
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: al-system-hpa
  namespace: active-learning
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: al-system
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

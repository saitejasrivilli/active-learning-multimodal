name: Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run security check with bandit
      run: |
        bandit -r . -f json -o bandit-report.json || true
    
    - name: Check dependencies with safety
      run: |
        safety check --json || true

  metrics:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Count lines of code
      run: |
        find . -name "*.py" -type f ! -path "./.git/*" ! -path "./.*" | xargs wc -l | tail -1
    
    - name: Count Python files
      run: |
        echo "Python files:"
        find . -name "*.py" -type f ! -path "./.git/*" ! -path "./.*" | wc -l
    
    - name: Check requirements
      run: |
        echo "Dependencies:"
        wc -l requirements.txt

  validate-config:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Validate JSON files
      run: |
        python3 -c "
        import json
        import glob
        
        for file in glob.glob('**/*.json', recursive=True):
          if '.git' not in file:
            try:
              with open(file) as f:
                json.load(f)
              print(f'✓ {file}')
            except Exception as e:
              print(f'✗ {file}: {e}')
        "
    
    - name: Check Python syntax
      run: |
        python3 -m py_compile data/synthetic_dataset.py
        python3 -m py_compile data/labels_simulation.py
        echo "✓ All Python files have valid syntax"
